name: Build modpack

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.event.head_commit.message, '[build]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache mod jars
        uses: actions/cache@v4
        with:
          path: minecraft/mods
          key: mods-${{ hashFiles('minecraft/mods/.index/**') }}
          restore-keys: mods-
      - name: Restore .index from git (cache may have stale metadata)
        run: git checkout -- minecraft/mods/.index/
      - name: Download mods
        run: python download_mods.py
      - name: Build modpack
        run: python compile.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modpack
          path: build/modpack-latest.zip
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          token: ${{ secrets.PAT }}
          artifacts: build/modpack-latest.zip
          allowUpdates: true
